<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CollabsKus</title>
<script>
  // GitHub Pages SPA redirect.
  // Redirects /blog/foo → /?/blog/foo so index.html can restore the real URL
  // before Blazor initialises and handle it via the client-side router.
  // pathSegmentsToKeep=0 for user/org sites (base href="/").
  // Change to 1 for project sites (base href="/reponame/").
  var l = window.location;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    l.pathname.split('/').slice(0, 1).join('/') + '/?/' +
    l.pathname.slice(1).split('/').slice(0).join('/').replace(/&/g, '~and~') +
    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash
  );
</script>
</head>
<body></body>
</html>
