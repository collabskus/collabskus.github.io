<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kathmandu Calendar & Time</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="CollabsKus.BlazorWebAssembly.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <script>// ── Moon visibility tracking (Page Visibility API + IntersectionObserver) ──
        window.moonVisibility = {
            _observer: null,
            _dotNetRef: null,
            _visHandler: null,

            init: function (dotNetRef, elementId) {
                this._dotNetRef = dotNetRef;

                // 1. Page Visibility API — detect tab focus/blur
                this._visHandler = function () {
                    var isVisible = !document.hidden;
                    dotNetRef.invokeMethodAsync('OnVisibilityChanged', isVisible);
                };
                document.addEventListener('visibilitychange', this._visHandler);

                // 2. IntersectionObserver — detect if moon section is in viewport
                var target = document.getElementById(elementId);
                if (target && 'IntersectionObserver' in window) {
                    this._observer = new IntersectionObserver(function (entries) {
                        var isInView = entries[0].isIntersecting;
                        dotNetRef.invokeMethodAsync('OnMoonInViewChanged', isInView);
                    }, {
                        // Trigger as soon as any part of the element is visible
                        threshold: 0.0
                    });
                    this._observer.observe(target);
                }

                // Return a reference so Blazor can call dispose
                return {
                    dispose: function () {
                        window.moonVisibility.dispose();
                    }
                };
            },

            dispose: function () {
                if (this._visHandler) {
                    document.removeEventListener('visibilitychange', this._visHandler);
                    this._visHandler = null;
                }
                if (this._observer) {
                    this._observer.disconnect();
                    this._observer = null;
                }
                this._dotNetRef = null;
            }
        };
        // ── Sun tracker canvas (add this block to wwwroot/index.html, inside the existing <script> tag) ──
        // Place it alongside the moonVisibility object.

        window.sunTracker = {
            _canvases: {},

            init: function (canvasId) {
                const canvas = document.getElementById(canvasId);
                if (!canvas) return;
                // Make canvas resolution match display size
                const resize = () => {
                    canvas.width = canvas.offsetWidth;
                    canvas.height = canvas.offsetHeight || 220;
                };
                resize();
                window.addEventListener('resize', resize);
                this._canvases[canvasId] = { canvas, resize };
            },

            draw: function (canvasId, altitude, azimuth, dayFraction, isAboveHorizon) {
                const entry = this._canvases[canvasId];
                if (!entry) return;
                const canvas = entry.canvas;
                const ctx = canvas.getContext('2d');
                const W = canvas.width, H = canvas.height;
                const cx = W / 2, horizY = H * 0.75;
                const arcRx = W * 0.44, arcRy = H * 0.82;

                ctx.clearRect(0, 0, W, H);

                // ── Sky gradient (shifts with altitude) ──────────────────────────
                let skyTop, skyBot;
                if (altitude > 15) { skyTop = '#061228'; skyBot = '#0d2040'; }
                else if (altitude > 0) { const t = altitude / 15; skyTop = lerpHex('#0f2050', '#061228', t); skyBot = lerpHex('#3a1a08', '#0d2040', t); }
                else if (altitude > -6) { const t = (altitude + 6) / 6; skyTop = lerpHex('#0a0e18', '#0f2050', t); skyBot = lerpHex('#1a0e04', '#3a1a08', t); }
                else { skyTop = '#04080f'; skyBot = '#080c16'; }

                const skyGrad = ctx.createLinearGradient(0, 0, 0, horizY);
                skyGrad.addColorStop(0, skyTop); skyGrad.addColorStop(1, skyBot);
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, W, horizY);

                // Ground
                const gnd = ctx.createLinearGradient(0, horizY, 0, H);
                gnd.addColorStop(0, '#0e180e'); gnd.addColorStop(1, '#060c06');
                ctx.fillStyle = gnd;
                ctx.fillRect(0, horizY, W, H - horizY);

                // Horizon glow
                if (altitude > -8 && altitude < 20) {
                    const t = Math.max(0, 1 - Math.abs(altitude) / 20);
                    const glow = ctx.createRadialGradient(cx, horizY, 0, cx, horizY, W * 0.5);
                    glow.addColorStop(0, `rgba(255,120,40,${0.38 * t})`);
                    glow.addColorStop(0.4, `rgba(255,80,20,${0.15 * t})`);
                    glow.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = glow;
                    ctx.fillRect(0, horizY - H * 0.4, W, H * 0.5);
                }

                // Horizon line
                ctx.beginPath(); ctx.moveTo(0, horizY); ctx.lineTo(W, horizY);
                ctx.strokeStyle = 'rgba(240,165,0,0.22)'; ctx.lineWidth = 1; ctx.stroke();

                // Dashed arc path
                ctx.beginPath();
                ctx.ellipse(cx, horizY, arcRx, arcRy, 0, Math.PI, 0, false);
                ctx.strokeStyle = 'rgba(240,165,0,0.10)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 7]);
                ctx.stroke();
                ctx.setLineDash([]);

                // Sun position on arc
                const frac = Math.max(0, Math.min(1, dayFraction < 0 ? 0.5 : dayFraction));
                const angle = Math.PI - frac * Math.PI; // PI=east → 0=west
                const sunX = cx + arcRx * Math.cos(angle);
                const sunY = horizY - arcRy * Math.sin(angle);

                if (dayFraction >= 0 && isAboveHorizon) {
                    // Corona
                    const corona = ctx.createRadialGradient(sunX, sunY, 2, sunX, sunY, 42);
                    corona.addColorStop(0, 'rgba(255,220,80,0.92)');
                    corona.addColorStop(0.2, 'rgba(255,180,40,0.5)');
                    corona.addColorStop(0.6, 'rgba(255,140,20,0.14)');
                    corona.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = corona;
                    ctx.beginPath(); ctx.arc(sunX, sunY, 42, 0, Math.PI * 2); ctx.fill();
                    // Disc
                    ctx.beginPath(); ctx.arc(sunX, sunY, 11, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffe060'; ctx.fill();
                } else if (dayFraction >= 0) {
                    ctx.beginPath(); ctx.arc(sunX, sunY, 8, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,160,60,0.38)'; ctx.fill();
                }

                // Labels
                ctx.font = '10px "Courier New", monospace';
                ctx.fillStyle = 'rgba(240,165,0,0.55)';
                ctx.textAlign = 'left';
                ctx.fillText(`ALT ${altitude >= 0 ? '+' : ''}${altitude.toFixed(1)}°`, 12, H - 10);
                ctx.textAlign = 'right';
                ctx.fillText(`AZ ${azimuth.toFixed(1)}°`, W - 12, H - 10);
                ctx.fillStyle = 'rgba(255,255,255,0.18)';
                ctx.textAlign = 'left'; ctx.fillText('E', 12, horizY - 5);
                ctx.textAlign = 'right'; ctx.fillText('W', W - 12, horizY - 5);
                ctx.textAlign = 'center'; ctx.fillText('S', cx, horizY - 5);
            },

            dispose: function (canvasId) {
                const entry = this._canvases[canvasId];
                if (!entry) return;
                window.removeEventListener('resize', entry.resize);
                delete this._canvases[canvasId];
            }
        };

        function lerpHex(c1, c2, t) {
            const r1 = parseInt(c1.slice(1, 3), 16), g1 = parseInt(c1.slice(3, 5), 16), b1 = parseInt(c1.slice(5, 7), 16);
            const r2 = parseInt(c2.slice(1, 3), 16), g2 = parseInt(c2.slice(3, 5), 16), b2 = parseInt(c2.slice(5, 7), 16);
            const r = Math.round(r1 + (r2 - r1) * t), g = Math.round(g1 + (g2 - g1) * t), b = Math.round(b1 + (b2 - b1) * t);
            return `rgb(${r},${g},${b})`;
        }
        </script>
</body>

</html>
